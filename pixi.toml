[project]
name = "mcr-robotics"
version = "0.1.0"
description = "Minimum Constraint Removal (MCR) path planning in PyBullet"
authors = ["Antigravity AI"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.10,<3.13"
pybullet = ">=3.2"
numpy = ">=1.20"
pyyaml = ">=6.0"
scipy = ">=1.8"
matplotlib = ">=3.5"
networkx = ">=2.8"

[tasks]
run = "python run.py"
list-scenes = "python run.py --list-scenes"
list-views = "python run.py --list-views"
scene1 = "python run.py --scene tabletop_scattered_cylinders_path_planning"
scene2 = "python run.py --scene tabletop_uniform_cylinders_approach_10_objects"
scene3 = "python run.py --scene tabletop_uniform_cylinders_approach_20_objects"
scene4 = "python run.py --scene shelf_packed_cylinders_transfer"
scene5 = "python run.py --scene tabletop_weighted_contact_costs"
scene6 = "python run.py --scene tabletop_push_rotate_nonprehensile"
scene7 = "python run.py --scene tabletop_kitchen_grocery_objects"
scene8 = "python run.py --scene tabletop_dense_household_clutter_reach"
scene9 = "python run.py --scene tabletop_kitchen_grocery_dataset_staging"
scene10 = "python run.py --scene tabletop_kitchen_google_scanned_objects"
scene11 = "python run.py --scene tabletop_pantry_google_scanned_objects"
gui-test = "python src/mcr/env/robot_manager.py --test-gui"
mcr-viz = "python scripts/mcr_core_visualization.py"
semantic-mcr-viz = "python scripts/mcr_semantic_pipeline_visualization.py"
mcr-compare-ui = "python scripts/build_mcr_compare_ui.py"
mcr-benchmark-ui = "python scripts/build_mcr_benchmark_ui.py"
