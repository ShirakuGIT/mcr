<text x="824" y="570" fill="#e6edf3" font-size="24" font-family="monospace" font-weight="bold">4. Why history-dependent collisions change the state</text>
<text x="828" y="614" fill="#e6edf3" font-size="18" font-family="monospace" font-weight="normal"><tspan x="828" dy="0">Professor&#x27;s modification:</tspan><tspan x="828" dy="26">The same roadmap vertex can have different collision sets depending</tspan><tspan x="828" dy="26">on which path history reached it.</tspan><tspan x="828" dy="26"></tspan><tspan x="828" dy="26">That means state is no longer just vertex v.</tspan><tspan x="828" dy="26">It becomes (v, accumulated_collision_set).</tspan><tspan x="828" dy="26"></tspan><tspan x="828" dy="26">Greedy danger:</tspan><tspan x="828" dy="26">If you keep only one best subset at each vertex, you may discard a</tspan><tspan x="828" dy="26">history that looks slightly worse now but avoids a dangerous object later.</tspan><tspan x="828" dy="26"></tspan><tspan x="828" dy="26">Minimum correct change:</tspan><tspan x="828" dy="26">Keep multiple non-dominated subsets per vertex.</tspan><tspan x="828" dy="26"></tspan><tspan x="828" dy="26">Practical approximation:</tspan><tspan x="828" dy="26">Use beam search or bounded-frontier pruning with semantic cost.</tspan></text>
<text x="828" y="890" fill="#e6edf3" font-size="20" font-family="monospace" font-weight="bold">Example same-vertex ambiguity</text>
