name: "Tabletop Kitchen Grocery Dataset Staging"
description: "Dataset-ready kitchen scene using object presets. Replace proxy presets with imported YCB or GSO assets as they land."
tags: ["kitchen", "grocery", "dataset-staging", "presets"]

object_libraries:
  - "configs/objects/household_and_grocery_presets.yaml"

robot:
  type: "fr3v2"
  urdf: "assets/urdfs/fr3v2_local.urdf"
  base_position: [-0.35, -0.25, 0.625]
  base_orientation: [0, 0, 0]
  initial_pose: "ready"

environment:
  table:
    urdf: "table/table.urdf"
    position: [0.0, 0.0, 0.0]
  ground:
    urdf: "plane.urdf"

camera:
  distance: 0.95
  yaw: 78
  pitch: -38
  target: [0.05, 0.02, 0.675]

objects:
  - { id: "tomato", preset: "tomato_proxy", position: [-0.10, 0.05, 0.660] }
  - { id: "broccoli", preset: "broccoli_proxy", position: [-0.05, -0.05, 0.655] }
  - { id: "spice_jar", preset: "spice_jar_proxy", position: [0.05, 0.08, 0.670] }
  - { id: "spice_jar_cap", type: "cylinder", position: [0.05, 0.08, 0.720], radius: 0.023, height: 0.01, color: "green" }
  - { id: "dressing_bottle", preset: "dressing_bottle_proxy", position: [0.15, 0.10, 0.705] }
  - { id: "dressing_label", type: "cylinder", position: [0.15, 0.10, 0.685], radius: 0.029, height: 0.06, color: "light_blue" }
  - { id: "oil_bottle", preset: "oil_bottle_proxy", position: [0.20, -0.05, 0.695] }
  - { id: "small_can", preset: "pantry_can_proxy", position: [0.08, -0.10, 0.655] }
  - { id: "small_can_lid", type: "cylinder", position: [0.08, -0.10, 0.690], radius: 0.026, height: 0.008, color: "yellow" }
  - { id: "pepper_bottle", preset: "pepper_bottle_proxy", position: [-0.15, 0.15, 0.675] }
  - { id: "pepper_cap", type: "cylinder", position: [-0.15, 0.15, 0.730], radius: 0.021, height: 0.01, color: "red" }
  - id: "scanned_object_placeholder"
    preset: "duck_scan_placeholder"
    position: [0.02, 0.18, 0.655]
    orientation_euler: [0.0, 0.0, 0.4]
    label:
      text: "Replace with YCB/GSO asset"
      offset: [0.0, 0.0, 0.12]
      color: [0.9, 0.9, 0.2]
      size: 1.1
